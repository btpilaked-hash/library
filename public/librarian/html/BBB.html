<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrowed Books - Grand University Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/Abb.css">
</head>

<body>

<aside>
    <section class="id-card">
        <img src="LOGOFIN.png" alt="LOGO" class="logo">
        <div class="inf"></div>
    </section>
    <nav class="nav">
        <button onclick="goTo('BlibDash.html')">DASHBOARD</button>
        <button onclick="goTo('Bbook.html')">BOOKS</button>
        <button onclick="goTo('Bstudents.html')">STUDENTS</button>
        <button onclick="goTo('Brequests.html')">REQUESTS</button>
        <button class="active">BORROWED BOOKS</button>
        <div class="log">
            <button onclick="goTo('logout.html')">LOG OUT</button>
        </div>
    </nav>
</aside>

<main>
    <h1>Borrowed Books</h1>

    <div class="top-bar">
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="borrowedSearch" placeholder="Search student, ID, or book..." oninput="renderBorrowedBooks()">
                <i class="fa fa-search"></i>
            </div>
        </div>
        <div class="bottom-controls">
            <button class="refresh-btn" onclick="loadBorrowedBooks()">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
            <select class="filter-select" id="borrowedStatusFilter" onchange="renderBorrowedBooks()">
                <option value="all">All Status</option>
                <option value="PickedUp">Picked Up</option>
                <option value="Returned">Returned</option>
                <option value="Lost">Lost</option>
            </select>
        </div>
    </div>

    <p id="borrowed_message"></p>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>Student Name</th>
                <th>Student ID</th>
                <th>Book Title</th>
                <th>Status</th>
                <th>Condition</th>
                <th>Request Date</th>
                <th>Responded At</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="requests-list"></tbody>
        </table>
    </div>

    <div class="empty-state" id="empty-state">
        No borrowed-book records match your filters.
    </div>
</main>

<div id="condModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:9999;">
    <div style="background:#fff;border-radius:10px;padding:1.5rem;width:320px;text-align:center;">
        <h4>Book Return Condition</h4>
        <input type="hidden" id="condRequestId">
        <label>Select Condition:</label><br>
        <select id="condSelect" style="width:100%;padding:0.5rem;margin:0.8rem 0;">
            <option value="Good">Good</option>
            <option value="Worn">Worn</option>
            <option value="Damaged">Damaged</option>
            <option value="Missing Pages">Missing Pages</option>
        </select>
        <label>Remarks (optional):</label><br>
        <input type="text" id="condRemarks" placeholder="Any notes..." style="width:100%;padding:0.5rem;margin:0.8rem 0;">
        <div style="display:flex;gap:8px;justify-content:center;">
            <button class="btn-accept" onclick="submitReturn()">Confirm Return</button>
            <button class="btn-decline" onclick="closeCondModal()">Cancel</button>
        </div>
        <p id="cond_message" style="color:red;font-size:13px;margin-top:0.8rem;"></p>
    </div>
</div>
<script src="/librarian/script/bb.js"></script>

</body>
</html>
